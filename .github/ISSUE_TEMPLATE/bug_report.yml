name: Desktop bug report
description: Report a reproducible LidlTool Desktop problem.
title: "[desktop] "
labels: ["bug", "desktop"]
body:
  - type: markdown
    attributes:
      value: |
        Attach a diagnostics bundle if you can create one from Help -> Create diagnostics bundle or the Diagnostics card. Do not attach receipt exports, databases, retailer HTML, screenshots, or credentials unless a maintainer explicitly asks.
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "0.2.0-beta.1"
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Release channel
      options:
        - beta
        - production
        - internal/dev
        - unknown
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: OS and architecture
      placeholder: "macOS 15 arm64 / Windows 11 x64"
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Affected workflow
      options:
        - Startup / launch
        - Main app
        - Receipt sync
        - Connector install or update
        - OCR
        - Export
        - Backup or restore
        - Mobile bridge
        - AI-assisted workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions that trigger the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: diagnostics
    attributes:
      label: Diagnostics bundle or GlitchTip event ID
      placeholder: "Attached lidltool-diagnostics-...zip / event id ..."
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not attach credentials, tokens, databases, receipt contents, or scraped retailer HTML.
          required: true

