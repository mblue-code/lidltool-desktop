[alembic]
script_location = src/lidltool/db/migrations
# Intentionally blank: set via LIDLTOOL_DB_URL or db.engine.migrate_db() override.
# Manual example: LIDLTOOL_DB_URL=sqlite:////data/db.sqlite alembic upgrade head
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
