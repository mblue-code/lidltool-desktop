[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lidltool"
version = "0.1.0"
description = "CLI for ingesting Lidl Plus receipts"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Maximilian Blücher" }]
dependencies = [
  "typer>=0.12.3",
  "rich>=13.7.1",
  "pydantic>=2.8.2",
  "httpx>=0.27.0",
  "fastapi>=0.116.0",
  "uvicorn>=0.35.0",
  "python-multipart>=0.0.20",
  "pypdf>=5.9.0",
  "PyMuPDF>=1.26.0",
  "SQLAlchemy>=2.0.30",
  "alembic>=1.13.2",
  "playwright>=1.45.0",
  "python-dateutil>=2.9.0.post0",
  "lidl-plus>=0.3.5",
  "cryptography>=46.0.5",
  "passlib[bcrypt]>=1.7.4",
  "PyJWT>=2.10.1",
  "openai>=1.109.0",
  "beautifulsoup4>=4.12.0",
  "lxml>=5.0.0",
]

[project.optional-dependencies]
keyring = [
  "keyring>=25.2.1",
]
server = [
  "uvicorn>=0.35.0",
  "playwright>=1.45.0",
]
dev = [
  "pytest>=8.3.2",
  "pytest-cov>=5.0.0",
  "mypy>=1.11.1",
  "ruff>=0.5.6",
  "black>=24.8.0",
  "pre-commit>=3.8.0",
  "types-python-dateutil>=2.9.0.20240316",
]

[project.scripts]
lidltool = "lidltool.cli:main"
lidltool-openclaw = "lidltool.openclaw.tool_adapter:main"
lidltool-ocr-api = "lidltool.api.http_server:main"
lidltool-job-worker = "lidltool.ingest.jobs:main"

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
exclude = ["src/lidltool/db/migrations"]

[[tool.mypy.overrides]]
module = ["lidlplus.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.hatch.build.targets.wheel]
packages = ["src/lidltool"]
artifacts = [
  "src/lidltool/connectors/official_market_catalog.json",
  "src/lidltool/connectors/curated_connector_catalog.json",
]
